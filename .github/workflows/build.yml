name: Overleaf PDF Scraper

on:
  schedule:
    # Runs every day at 06:00 UTC
    - cron: */5 * * * *

  # Allow manual trigger from the Actions tab at any time
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── 1. Check out the repository ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      # ── 2. Set up Node.js ──────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "20"
          cache: "npm"

      # ── 3. Install npm dependencies ────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Install Playwright's Chromium browser ───────────────────────────
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # ── 5. Run the scraper ─────────────────────────────────────────────────
      - name: Run scraper
        run: node scraper.js

      # ── 6. Commit and push changes ─────────────────────────────────────────
      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage new/updated PDFs in both locations, deleted old ones, and history
          git add Nakul_Dev_M_V_Resume.pdf scrapped/ linkHistory.json

          # Only commit if there is actually something new
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "feat: update resume [$TIMESTAMP]"
            git push
          fi
